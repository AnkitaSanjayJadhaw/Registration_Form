<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<form id="registration-form">

    <div class="header">
        <h1>Registration Form</h1>
        <marquee direction="right">
            This Article Is Just For Demo Purpose
        </marquee>
    </div>

    <!-- Name Section -->
    <div class="name-section">

        <div class="input-box">
            <label>First Name</label>
            <input type="text" name="myname"
                   placeholder="Type your first name" required>
        </div>

        <div class="input-box">
            <label>Last Name</label>
            <input type="text" name="lname"
                   placeholder="Type your last name" required>
        </div>

    </div>

    <!-- DOB -->
    <div class="input-box">
        <label>Date of Birth</label>
        <input type="date" required>
    </div>

    <!-- Role -->
    <div class="input-box">
        <label>Role</label>
        <input type="text" name="role"
               placeholder="i.e: Software Engineer" required>
    </div>

    <!-- Email -->
    <div class="input-box">
        <label>Email</label>
        <input type="email" name="email"
               placeholder="name@gmail.com" required>
    </div>

    <!-- Password -->
    <div class="input-box">

        <label>Create Password</label>

        <div class="password-wrapper">

            <input type="password"
                   id="password"
                   placeholder="Type your password"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword('password', this)">
                Show
            </span>

        </div>

        <!-- Strength Meter -->
        <div class="strength-meter">
            <div class="strength-bar" id="strength-bar"></div>
        </div>

        <div class="strength-text" id="strength-text"></div>

    </div>

    <!-- Confirm Password -->
    <div class="input-box">

        <label>Confirm Password</label>

        <div class="password-wrapper">

            <input type="password"
                   id="com-password"
                   placeholder="Re-type your password"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword('com-password', this)">
                Show
            </span>

        </div>

        <div class="match-text" id="match-text"></div>

    </div>

    <!-- Course -->
    <div class="input-box">

        <label>Course</label>

        <select id="course">

            <option value="">-- Please Select --</option>

            <option>Web Development</option>
            <option>App Development</option>
            <option>Data Analytics</option>
            <option>Ethical Hacking</option>
            <option>Introduction to AI</option>
            <option>Machine Learning</option>
            <option>Finance Management</option>
            <option>Business Management</option>
            <option>HTML for Beginners</option>
            <option>Python for Beginners</option>

            <optgroup label="Languages">
                <option>English</option>
                <option>Urdu</option>
                <option>Sindhi</option>
                <option>Marathi</option>
            </optgroup>

        </select>

    </div>

    <!-- Checkbox -->
    <div class="checkbox-section">

        <h5>Note: Must have completed Intermediate</h5>

        <label class="checkbox-label">
            <input type="checkbox" required>
            Are you eligible?
        </label>

    </div>

    <!-- Buttons -->
    <div class="button-group">

        <input type="submit"
               value="Submit Now"
               class="submit-btn">

        <input type="reset"
               value="Reset"
               class="reset-btn">

    </div>

</form>

<script src="script.js"></script>

</body>
</html>
